# Evita perdita di precisione su BigDecimal (es. prezzoBase)
spring.jackson.deserialization.USE_BIG_DECIMAL_FOR_FLOATS=true

# Debug per verificare payload ricevuti
logging.level.com.e_commerce.controller.ProductController=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5433/e_commerce_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# PostgreSQLDialect viene selezionato automaticamente da Hibernate

# Thymeleaf: evita warning se non usi template (frontend React)
spring.thymeleaf.check-template-location=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.port=8083

# Limite dimensione file upload (CSV, Excel, XML) - default Spring era 1MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Icecat: usa le STESSE credenziali della tab Authorization di Postman (da https://icecat.biz/myIcecat)
icecat.lang=IT
icecat.username=admin95
icecat.password=admin95@
# Cartella per immagini e descrizioni Icecat (creata nella root del progetto)
icecat.storage-path=./storage/product-data
# Cache immagini Icecat: evita re-download dopo reset catalogo o re-import (persistente)
icecat.cache-path=./storage/icecat-cache

