# Evita perdita di precisione su BigDecimal (es. prezzoBase)
spring.jackson.deserialization.USE_BIG_DECIMAL_FOR_FLOATS=true

# Debug per verificare payload ricevuti
logging.level.com.e_commerce.controller.ProductController=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5433/e_commerce_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.port=8083

# Limite dimensione file upload (CSV, Excel, XML) - default Spring era 1MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
